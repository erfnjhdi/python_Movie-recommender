name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/movie-recommender:${{ github.sha }} Backend/
          docker tag ${{ secrets.REGISTRY_URL }}/movie-recommender:${{ github.sha }} ${{ secrets.REGISTRY_URL }}/movie-recommender:latest

      - name: Push Docker image to ACR
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/movie-recommender:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_URL }}/movie-recommender:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: movie-recommender-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.REGISTRY_URL }}/movie-recommender:latest
